<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Rifa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            <h4>Registro de Rifa</h4>
        </div>

        <div class="card-body">

            <form id="formRegistro">

                <div class="mb-3">
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre completo" required>
                </div>

                <div class="mb-3">
                    <input type="number" name="cedula" class="form-control" placeholder="Cédula" required>
                </div>

                <div class="mb-3">
                    <input type="lider" name="lider" class="form-control" placeholder="Nombre" required>
                </div>

                <button class="btn btn-success w-100">
                    Registrar
                </button>

            </form>

            <div id="resultado" class="mt-4 text-center"></div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    document.getElementById("formRegistro").addEventListener("submit", function(e){
        e.preventDefault();

        let formData = new FormData(this);

        axios.post("/registrar", formData)
            .then(response => {

                document.getElementById("resultado").innerHTML =
                    "<div class='alert alert-success'>" +
                    "<h5>🎉 Registrado correctamente</h5>" +
                    "<h3>Tu número es: " + response.data.numero + "</h3>" +
                    "</div>";

                this.reset();
            })
            .catch(error => {
                document.getElementById("resultado").innerHTML =
                    "<div class='alert alert-danger'>Error al registrar</div>";
                console.log(error);
            });
    });
</script>

</body>
</html>
